name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Restore
        run: dotnet restore

      - name: Run backend tests
        run: dotnet test backend/TrackRank.Api.Tests/TrackRank.Api.Tests.csproj --configuration Release --no-restore

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/trackrank-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/trackrank-web

      - name: Build frontend
        run: npm run build
        working-directory: frontend/trackrank-web
